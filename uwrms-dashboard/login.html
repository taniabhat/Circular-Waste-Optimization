<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UWRMS — Sign In</title>
  <meta name="description" content="Sign in to the UWRMS Waste Intelligence Platform dashboard"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet"/>
  <script src="js/theme.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #0b0f0e;
      --bg2:    #111916;
      --bg3:    #172018;
      --card:   #1a2420;
      --card2:  #1f2d28;
      --green:  #22c55e;
      --green2: #16a34a;
      --green3: #4ade80;
      --teal:   #2dd4bf;
      --amber:  #f59e0b;
      --red:    #ef4444;
      --blue:   #60a5fa;
      --text:   #e2ffe8;
      --text2:  #9ab8a4;
      --text3:  #5a7a64;
      --border: #2a3d34;
    }

    :root[data-theme="light"] {
      --bg:     #faf5f0;
      --bg2:    #ffffff;
      --bg3:    #f0e9e1;
      --card:   #ffffff;
      --card2:  #faf5f0;
      --green:  #c2185b;
      --green2: #880e4f;
      --green3: #e91e63;
      --teal:   #9c27b0;
      --amber:  #ff8f00;
      --red:    #d32f2f;
      --blue:   #1976d2;
      --text:   #2d2327;
      --text2:  #5c4a52;
      --text3:  #8a7982;
      --border: #e8dfd5;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    .mono { font-family: 'Space Mono', monospace; }

    /* Animated background */
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .login-page::before {
      content: '';
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background:
        radial-gradient(ellipse at 20% 50%, color-mix(in srgb, var(--green3) 8%, transparent) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, color-mix(in srgb, var(--teal) 6%, transparent) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 80%, color-mix(in srgb, var(--blue) 5%, transparent) 0%, transparent 50%);
      animation: bgShift 20s ease-in-out infinite alternate;
    }

    @keyframes bgShift {
      0%   { transform: translate(0, 0) rotate(0deg); }
      100% { transform: translate(-3%, 2%) rotate(3deg); }
    }

    /* Grid background */
    .grid-overlay {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(42,61,52,0.3) 1px, transparent 1px),
        linear-gradient(90deg, rgba(42,61,52,0.3) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    /* Floating particles */
    .particles {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      animation: float linear infinite;
      opacity: 0.4;
    }

    @keyframes float {
      0%   { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10%  { opacity: 0.4; }
      90%  { opacity: 0.4; }
      100% { transform: translateY(-100px) rotate(720deg); opacity: 0; }
    }

    /* Login card */
    .login-card {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      margin: 20px;
      background: rgba(26, 36, 32, 0.85);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(42, 61, 52, 0.6);
      border-radius: 20px;
      padding: 40px 36px;
      box-shadow:
        0 0 80px color-mix(in srgb, var(--green3) 6%, transparent),
        0 25px 50px rgba(0,0,0,0.4);
    }

    /* Logo */
    .login-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
      justify-content: center;
    }

    .login-logo-icon {
      width: 44px; height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--green2), var(--teal));
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px color-mix(in srgb, var(--green3) 30%, transparent);
    }

    .login-logo-icon svg { width: 22px; height: 22px; }

    .login-logo-text {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.5px;
    }

    .login-subtitle {
      text-align: center;
      color: var(--text3);
      font-size: 13px;
      margin-bottom: 32px;
      font-family: 'Space Mono', monospace;
    }

    /* Tabs */
    .auth-tabs {
      display: flex;
      background: var(--bg2);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 28px;
      border: 1px solid var(--border);
    }

    .auth-tab {
      flex: 1;
      padding: 10px 0;
      text-align: center;
      font-size: 13px;
      font-weight: 500;
      color: var(--text3);
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.25s ease;
      border: none;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
    }

    .auth-tab:hover { color: var(--text2); }

    .auth-tab.active {
      background: var(--card2);
      color: var(--green3);
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    /* Form */
    .auth-form { display: none; }
    .auth-form.active { display: block; animation: fadeSlide 0.3s ease; }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: none; }
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-label {
      display: block;
      font-size: 11px;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 6px;
      font-weight: 500;
    }

    .form-input {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--green3) 15%, transparent);
    }

    .form-input::placeholder {
      color: var(--text3);
    }

    /* Submit button */
    .submit-btn {
      width: 100%;
      padding: 14px 0;
      background: linear-gradient(135deg, var(--green2), var(--teal));
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
      font-family: 'DM Sans', sans-serif;
      margin-top: 6px;
      position: relative;
      overflow: hidden;
    }

    .submit-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px color-mix(in srgb, var(--green3) 30%, transparent);
    }

    .submit-btn:active { transform: translateY(0); }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .submit-btn .btn-loading {
      display: none;
    }

    .submit-btn.loading .btn-text { visibility: hidden; }
    .submit-btn.loading .btn-loading {
      display: block;
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }

    .spinner {
      width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Messages */
    .form-message {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 12px;
      margin-bottom: 16px;
      display: none;
      animation: fadeSlide 0.3s ease;
    }

    .form-message.show { display: block; }
    .form-message.error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: var(--red);
    }
    .form-message.success {
      background: color-mix(in srgb, var(--green3) 10%, transparent);
      border: 1px solid color-mix(in srgb, var(--green3) 30%, transparent);
      color: var(--green3);
    }

    /* Footer */
    .login-footer {
      text-align: center;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .login-footer-text {
      font-size: 11px;
      color: var(--text3);
    }

    .login-footer-link {
      color: var(--green3);
      text-decoration: none;
      font-weight: 500;
    }

    .login-footer-link:hover {
      text-decoration: underline;
    }

    /* Status indicator */
    .server-status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 16px;
      font-size: 10px;
      color: var(--text3);
      font-family: 'Space Mono', monospace;
    }

    .server-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.5; transform: scale(1.3); }
    }

    .server-dot.offline { background: var(--red); animation: none; }

    /* Password strength */
    .password-strength {
      display: flex;
      gap: 4px;
      margin-top: 6px;
    }

    .strength-bar {
      flex: 1;
      height: 3px;
      background: var(--bg3);
      border-radius: 2px;
      transition: background 0.3s;
    }

    .strength-bar.active.weak   { background: var(--red); }
    .strength-bar.active.medium { background: var(--amber); }
    .strength-bar.active.strong { background: var(--green); }

    .strength-text {
      font-size: 10px;
      margin-top: 4px;
      font-family: 'Space Mono', monospace;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .login-card { padding: 28px 22px; margin: 12px; }
      .login-logo-text { font-size: 18px; }
    }
  </style>
</head>
<body>

  <div class="login-page">
    <div class="grid-overlay"></div>

    <div class="particles" id="particles"></div>

    <div class="login-card">
      <!-- Logo -->
      <div class="login-logo">
        <div class="login-logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
            <path d="M4 4h6v6H4zM14 4h6v6h-6zM4 14h6v6H4z"/>
            <path d="M14 17h6M17 14v6" stroke-linecap="round"/>
          </svg>
        </div>
        <span class="login-logo-text">UWRMS</span>
      </div>
      <div class="login-subtitle">Waste Intelligence Platform</div>

      <!-- Auth Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="signin" id="tab-signin-btn">Sign In</button>
        <button class="auth-tab" data-tab="signup" id="tab-signup-btn">Sign Up</button>
      </div>

      <!-- Message -->
      <div class="form-message" id="form-message"></div>

      <!-- Sign In Form -->
      <form class="auth-form active" id="signin-form">
        <div class="form-group">
          <label class="form-label" for="signin-email">Email Address</label>
          <input class="form-input" type="email" id="signin-email" placeholder="you@example.com" required autocomplete="email"/>
        </div>
        <div class="form-group">
          <label class="form-label" for="signin-password">Password</label>
          <div class="password-wrapper" style="position: relative;">
            <input class="form-input" style="padding-right: 40px;" type="password" id="signin-password" placeholder="••••••••" required autocomplete="current-password"/>
            <button type="button" class="toggle-password" data-target="signin-password" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text3); cursor: pointer;">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <button class="submit-btn" type="submit" id="signin-btn">
          <span class="btn-text">Sign In</span>
          <span class="btn-loading"><div class="spinner"></div></span>
        </button>
      </form>

      <!-- Sign Up Form -->
      <form class="auth-form" id="signup-form">
        <div class="form-group">
          <label class="form-label" for="signup-name">Full Name</label>
          <input class="form-input" type="text" id="signup-name" placeholder="Tania Bhat" required autocomplete="name"/>
        </div>
        <div class="form-group">
          <label class="form-label" for="signup-email">Email Address</label>
          <input class="form-input" type="email" id="signup-email" placeholder="you@example.com" required autocomplete="email"/>
        </div>
        <div class="form-group">
          <label class="form-label" for="signup-password">Password</label>
          <div class="password-wrapper" style="position: relative;">
            <input class="form-input" style="padding-right: 40px;" type="password" id="signup-password" placeholder="Min 6 characters" required minlength="6" autocomplete="new-password"/>
            <button type="button" class="toggle-password" data-target="signup-password" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text3); cursor: pointer;">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div class="password-strength" id="password-strength">
            <div class="strength-bar" id="str-1"></div>
            <div class="strength-bar" id="str-2"></div>
            <div class="strength-bar" id="str-3"></div>
            <div class="strength-bar" id="str-4"></div>
          </div>
          <div class="strength-text" id="strength-text" style="color: var(--text3)"></div>
        </div>
        <button class="submit-btn" type="submit" id="signup-btn">
          <span class="btn-text">Create Account</span>
          <span class="btn-loading"><div class="spinner"></div></span>
        </button>
      </form>

      <!-- Footer -->
      <div class="login-footer">
        <div class="login-footer-text">
          Powered by AI-Driven Waste Intelligence
        </div>
        <div class="server-status">
          <div class="server-dot" id="server-dot"></div>
          <span id="server-status-text">Connecting to server...</span>
        </div>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
